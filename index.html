<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オーダースーツ 仕様ガイド｜比較ツール</title>
<style>
  :root{
    --navy:#1f3a5c; --navy2:#2a4d78; --teal:#21544f; --plum:#7a3442; --lplum:#f4eaee; --gold:#c4a45a; --gold-l:#ead296;
    --cream:#f7f3e9; --lblue:#e8f0f7; --lgold:#fbf3e1; --lgreen:#e9f3eb;
    --ink:#232323; --muted:#6b6b6b; --line:#e2ddd2; --bg:#f4f2ee; --white:#fff;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Meiryo","Hiragino Kaku Gothic ProN","Yu Gothic UI",system-ui,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--navy2)}
  /* Top bar */
  header.top{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.18)}
  .top-inner{max-width:1180px;margin:0 auto;padding:12px 18px}
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .brand h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.5px}
  .brand .sub{font-size:12px;color:var(--gold-l)}
  .toolbar{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;padding:9px 34px 9px 12px;border-radius:8px;border:none;font-size:14px;
    font-family:inherit}
  .search .x{position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:#999;
    font-size:18px;display:none;background:none;border:none}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);
    padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
  .tab:hover{background:rgba(255,255,255,.22)}
  .tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:700}
  /* Layout */
  main{max-width:1180px;margin:0 auto;padding:20px 18px 80px}
  .hint{font-size:13px;color:var(--muted);margin:2px 0 16px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  /* Card */
  .card{background:var(--white);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    display:flex;flex-direction:column;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .card .head{background:var(--navy);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;
    align-items:center;gap:8px}
  .card.pants .head{background:var(--teal)}
  .card.vest .head{background:var(--plum)}
  .vphoto{width:100%;background:var(--lplum);border:1px solid var(--line);border-radius:8px;padding:18px 14px;
    text-align:center;display:flex;flex-direction:column;gap:8px;align-items:center}
  .vphoto .vtag{background:var(--plum);color:#fff;font-size:12px;font-weight:700;padding:5px 14px;border-radius:14px}
  .vphoto .vterm{font-size:18px;font-weight:700;color:var(--plum)}
  .vphoto .vsee{font-size:12.5px;color:var(--ink);background:#fff;border-radius:8px;padding:8px 10px;margin-top:2px}
  .card .head .term{font-size:17px;font-weight:700}
  .card .head .read{font-size:11px;color:var(--gold-l);margin-top:2px}
  .card .head .no{font-size:11px;background:var(--gold);color:var(--navy);padding:3px 9px;border-radius:12px;
    font-weight:700;white-space:nowrap}
  .card .body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;flex:1}
  .photo{width:100%;background:#f6f6f3;border-radius:8px;overflow:hidden;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;cursor:zoom-in}
  .photo img{width:100%;height:auto;display:block;max-height:230px;object-fit:contain}
  .cmpimgs{display:flex;gap:8px}
  .cmpfig{flex:1 1 0;min-width:0;margin:0;display:flex;flex-direction:column;gap:5px}
  .cmpfig img{width:100%;height:auto;border:1px solid var(--line);border-radius:7px;background:#f6f6f3;
    cursor:zoom-in;max-height:190px;object-fit:contain}
  .cmpfig figcaption{font-size:11.5px;color:var(--navy);font-weight:700;text-align:center;line-height:1.35}
  .blk{border-radius:8px;padding:10px 12px}
  .blk .lbl{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:5px;display:flex;align-items:center;gap:6px}
  .blk.whatis{background:var(--lblue)}
  .blk.compare{background:var(--lgold)}
  .blk.talk{background:var(--lgreen);font-style:normal}
  .blk .txt{font-size:13.5px}
  .talk .txt{color:#2f5d43}
  /* options table */
  table.opts{width:100%;border-collapse:collapse;font-size:13px}
  table.opts td{border-bottom:1px solid var(--line);padding:6px 4px;vertical-align:top}
  table.opts tr:last-child td{border-bottom:none}
  table.opts .oname{font-weight:700;color:var(--navy);white-space:nowrap;padding-right:10px;width:1%}
  .paid{color:#b3541e;font-weight:700}
  .opt-lbl{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px}
  /* comparison tables */
  .ctable-wrap{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:22px;
    overflow-x:auto}
  .ctable-wrap h3{margin:0 0 4px;color:var(--navy);font-size:18px}
  .ctable-wrap .lead{font-size:13px;color:var(--muted);margin-bottom:12px}
  table.cmp{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px}
  table.cmp th,table.cmp td{border:1px solid var(--line);padding:9px 11px;text-align:center}
  table.cmp thead th{background:var(--navy);color:#fff}
  table.cmp tbody td:first-child{background:var(--cream);font-weight:700;text-align:left;color:var(--navy);white-space:nowrap}
  table.cmp tbody tr:nth-child(even) td{background:#faf9f6}
  /* glossary */
  .gloss{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  @media(max-width:820px){.gloss{grid-template-columns:1fr}}
  .gitem{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 13px;font-size:13.5px}
  .gitem b{color:var(--navy)}
  .section-title{font-size:15px;color:var(--navy);font-weight:700;margin:6px 0 12px;
    border-left:5px solid var(--gold);padding-left:10px}
  mark{background:#fff1a8;padding:0 1px;border-radius:2px}
  .noresult{color:var(--muted);padding:30px;text-align:center}
  .hidden{display:none!important}
  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;
    z-index:100;padding:24px;cursor:zoom-out}
  .lb.open{display:flex}
  .lb img{max-width:95%;max-height:92%;border-radius:6px;box-shadow:0 6px 30px rgba(0,0,0,.5)}
  footer{max-width:1180px;margin:0 auto;padding:0 18px 40px;color:var(--muted);font-size:12px}
  @media print{header.top{position:static}.tabs,.search,.tab{display:none}.grid{grid-template-columns:1fr}}
</style>
</head>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <h1>オーダースーツ 仕様ガイド</h1>
      <span class="sub">新人でもわかる・お客様に説明できる 比較ツール</span>
    </div>
    <div class="toolbar">
      <div class="search">
        <input id="q" type="text" placeholder="検索（例：ベント / 総毛芯 / フラップ / タック …）" autocomplete="off">
        <button class="x" id="qx" title="クリア">×</button>
      </div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-view="jacket">ジャケット</button>
        <button class="tab" data-view="pants">パンツ</button>
        <button class="tab" data-view="vest">ベスト</button>
        <button class="tab" data-view="tables">早わかり比較</button>
        <button class="tab" data-view="glossary">用語集</button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="hint" id="hint"></div>
  <div id="view-jacket"></div>
  <div id="view-pants" class="hidden"></div>
  <div id="view-vest" class="hidden"></div>
  <div id="view-tables" class="hidden"></div>
  <div id="view-glossary" class="hidden"></div>
  <div class="noresult hidden" id="noresult">該当する項目が見つかりませんでした。別のキーワードでお試しください。</div>
</main>

<footer>
  ※印＝有料オプション　／　「標準」と書かれた仕様を選べば、まず失敗しません。<br>
  画像はフォルダ内の <code>media</code> と一緒に保管してください。&nbsp;LB オーダースーツ 仕様ガイド 2026年版。
</footer>

function esc(s){return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function paidize(s){return esc(s).replace(/※/g,'<span class="paid">※</span>');}
function optRow(o){
  const i=o.indexOf('：');
  let name=o, desc='';
  if(i>=0){name=o.slice(0,i);desc=o.slice(i+1);}
  return `<tr><td class="oname">${paidize(name)}</td><td>${paidize(desc)}</td></tr>`;
}
function card(c){
  const imgs = (c.images||[]);
  const media = imgs.length
    ? `<div class="cmpimgs">`+imgs.map(im=>
        `<figure class="cmpfig"><img loading="lazy" src="media/${esc(im.f)}" alt="${esc(im.cap)}"><figcaption>${esc(im.cap)}</figcaption></figure>`
      ).join('')+`</div>`
    : `<div class="vphoto"><div class="vtag">VEST／ベスト（ジレ）</div><div class="vterm">${esc(c.term)}</div>`+
      (c.seealso&&c.seealso.trim()?`<div class="vsee">🔗 ${esc(c.seealso)}</div>`:``)+`</div>`;
  return `<div class="card ${c.sec}" data-text="${esc(c.term+' '+c.read+' '+c.whatis+' '+c.options.join(' ')+' '+c.compare+' '+c.talk+' '+(c.seealso||'')).replace(/"/g,'')}">
    <div class="head"><div><div class="term">${esc(c.term)}</div><div class="read">${esc(c.read)}</div></div>
      <div class="no">${esc(c.no)}</div></div>
    <div class="body">
      ${media}
      <div class="blk whatis"><div class="lbl">💡 これは？（かんたん解説）</div><div class="txt">${paidize(c.whatis)}</div></div>
      <div><div class="opt-lbl">📋 主な選択肢（そのまま比較できます）</div>
        <table class="opts">${c.options.map(optRow).join('')}</table></div>
      <div class="blk compare"><div class="lbl">⚖️ 選び方・比較</div><div class="txt">${paidize(c.compare)}</div></div>
      <div class="blk talk"><div class="lbl">🗣️ 接客トーク例</div><div class="txt">${paidize(c.talk)}</div></div>
    </div></div>`;
}
function cmpTable(t){
  const head=`<tr>${t.headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr>`;
  const rows=t.rows.map(r=>`<tr>${r.map(x=>`<td>${paidize(x)}</td>`).join('')}</tr>`).join('');
  return `<div class="ctable-wrap" data-text="${esc(t.title+' '+t.lead+' '+t.rows.flat().join(' ')).replace(/"/g,'')}">
    <h3>${esc(t.title)}</h3><div class="lead">${esc(t.lead)}</div>
    <table class="cmp"><thead>${head}</thead><tbody>${rows}</tbody></table></div>`;
}
function glossItem(g){
  return `<div class="gitem" data-text="${esc(g.t+' '+g.d).replace(/"/g,'')}"><b>${esc(g.t)}</b> ： ${esc(g.d)}</div>`;
}

  document.getElementById('hint').textContent=hintText[v];
  applySearch();
}
document.getElementById('tabs').addEventListener('click',e=>{
  if(e.target.dataset.view) setView(e.target.dataset.view);
});

// search
const q=document.getElementById('q'), qx=document.getElementById('qx');
function clearMarks(el){el.querySelectorAll('mark').forEach(m=>{m.replaceWith(m.textContent);});el.normalize&&el.normalize();}
function applySearch(){
  const term=q.value.trim().toLowerCase();
  qx.style.display=term?'block':'none';
  const containerId='view-'+current;
  const container=document.getElementById(containerId);
  const items=container.querySelectorAll('[data-text]');
  let visible=0;
  items.forEach(it=>{
    const hit = !term || it.dataset.text.toLowerCase().includes(term);
    it.classList.toggle('hidden',!hit);
    if(hit)visible++;
  });
  document.getElementById('noresult').classList.toggle('hidden',visible>0);
}
q.addEventListener('input',applySearch);
qx.addEventListener('click',()=>{q.value='';applySearch();q.focus();});

// lightbox
const lb=document.getElementById('lb'), lbimg=document.getElementById('lbimg');
document.body.addEventListener('click',e=>{
  const img=e.target.closest('.photo img, .cmpfig img');
  if(img){lbimg.src=img.src;lb.classList.add('open');}
  else if(e.target.closest('.lb')){lb.classList.remove('open');}
});

setView('jacket');
</script>
